<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomía Humana: Explorador y Borrador</title>
    <style>
        /* Estilos generales y diseño de la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
            text-align: center;
            color: #000000;
        }

        p {
            color: #808e9b;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
        }

        /* --- CSS PARA EL MENÚ IZQUIERDO Y CONTENEDOR --- */
        .contenedor-principal {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
        }

        .menu-izquierdo {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
            background: #ccccff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .menu-izquierdo select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            background: #2f3640;
            color: #d2dae2;
            border: 1px solid #718093;
            font-size: 1rem;
            cursor: pointer;
        }

        .contenedor-imagen-menu {
            position: relative;
            width: 100%;
            display: none; 
            border-radius: 5px;
            background: #2d3436;
            border: 1px solid #718093;
            overflow: hidden;
        }

        .img-detalle-zona {
            display: block;
            width: 100%;
            height: auto;
        }

        .marcador-parte {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: #ff3838;
            border: 2px solid #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255, 56, 56, 0.8);
            animation: latido 1.2s infinite;
            pointer-events: none;
            display: none;
        }

        @keyframes latido {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .panel-info {
            background: #ffffff;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #0fbcf9;
            font-size: 0.9rem;
            line-height: 1.4;
            display: none;
        }

        /* --- CONTENEDOR PRINCIPAL DEL BORRADOR --- */
        .visor-anatomia {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            background: #000000;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .contenedor-lienzo {
            position: relative;
            width: 350px;
            height: 700px;
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #dcdd31 25%, transparent 25%), 
                linear-gradient(-45deg, #dcdde1 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #dcdde1 75%), 
                linear-gradient(-45deg, transparent 75%, #dcdde1 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .capa-anatomia {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
        }

        .capa-activa {
            pointer-events: auto;
            cursor: crosshair;
        }

        /* --- PANEL DE HERRAMIENTAS LATERAL --- */
        .herramientas {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 250px;
            background: #ccccff;
            padding: 20px;
            border-radius: 10px;
        }

        .titulo-herramientas {
            font-size: 1.2rem;
            border-bottom: 2px solid #0fbcf9;
            padding-bottom: 10px;
            font-weight: bold;
        }

        .selector-capa {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px;
            background: #2f3640;
            border-radius: 5px;
            border: 1px solid #718093;
            transition: all 0.3s;
        }

        .radio-btn:hover { background: #40739e; }
        .radio-btn input[type="radio"] { cursor: pointer; }

        .control-grupo {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        button.btn-restaurar {
            padding: 12px;
            background: #cc99ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button.btn-restaurar:hover {
            background: #ff00ff;
        }

        /* Responsividad */
        @media (max-width: 768px) {
            .visor-anatomia, .contenedor-principal {
                flex-direction: column;
                align-items: center;
            }
            .contenedor-lienzo {
                width: 100%;
                max-width: 350px;
                height: 600px;
            }
            .herramientas, .menu-izquierdo {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <h1>Anatomía Humana Interactiva</h1>
    <p>Explora los sistemas en el menú izquierdo o usa el borrador mágico a la derecha para descubrir qué hay debajo.</p>

    <div class="contenedor-principal">

        <div class="menu-izquierdo">
            <div class="titulo-herramientas">Explorador de Sistemas</div>
            
            <div class="control-grupo">
                <label><strong>1. Selecciona un Sistema:</strong></label>
                <select id="select-sistema" onchange="actualizarSistema()">
                    <option value="">-- Elige un sistema --</option>
                    <option value="esqueleto">Sistema Óseo (Esqueleto)</option>
                    <option value="musculos">Sistema Muscular</option>
                    <option value="nervioso">Sistema Nervioso</option>
                    <option value="organos">Órganos Internos</option>
                </select>
            </div>

            <div id="contenedor-img-zona" class="contenedor-imagen-menu">
                <img id="img-zona" class="img-detalle-zona" src="" alt="Detalle del sistema">
                <div id="marcador" class="marcador-parte"></div>
            </div>

            <div class="control-grupo" id="contenedor-subpartes" style="display: none;">
                <label><strong>2. Partes de este sistema:</strong></label>
                <select id="select-subparte" onchange="actualizarInfoSubparte()">
                </select>
            </div>

            <div id="panel-info" class="panel-info"></div>
        </div>

        <div class="visor-anatomia">
            <div class="contenedor-lienzo">
                <img src="esqueleto.png" class="capa-anatomia" style="z-index: 1;" alt="Esqueleto">
                
                <canvas id="canvas-nervioso" class="capa-anatomia" style="z-index: 2;"></canvas>
                <canvas id="canvas-organos" class="capa-anatomia" style="z-index: 3;"></canvas>
                <canvas id="canvas-musculos" class="capa-anatomia capa-activa" style="z-index: 4;"></canvas>
            </div>

            <div class="herramientas">
                <div class="titulo-herramientas">Herramienta Borrador</div>
                
                <div class="control-grupo">
                    <label><strong>1. ¿Qué capa deseas borrar?</strong></label>
                    <div class="selector-capa">
                        <label class="radio-btn">
                            <input type="radio" name="capaSelect" value="canvas-musculos" checked onchange="cambiarCapaActiva()">
                            Músculos (Capa Exterior)
                        </label>
                        <label class="radio-btn">
                            <input type="radio" name="capaSelect" value="canvas-organos" onchange="cambiarCapaActiva()">
                            Órganos Internos
                        </label>
                        <label class="radio-btn">
                            <input type="radio" name="capaSelect" value="canvas-nervioso" onchange="cambiarCapaActiva()">
                            Sistema Nervioso
                        </label>
                    </div>
                </div>

                <hr style="width: 100%; border-color: #718093; margin: 10px 0;">

                <div class="control-grupo">
                    <label for="size-borrador"><strong>2. Tamaño del Borrador: <span id="valor-size">30</span>px</strong></label>
                    <input type="range" id="size-borrador" min="10" max="80" value="30" oninput="actualizarSizeBorrador()">
                </div>

                <button class="btn-restaurar" onclick="inicializarLienzos()">🔄 Restaurar Todas las Capas</button>
            </div>
        </div>

    </div>

    <script>
        /* =========================================
           EXPLORADOR DE SISTEMAS Y MARCADORES (CORREGIDO A .PNG)
           ========================================= */
        
        const datosSistemas = {
            "esqueleto": {
                imagen: "esqueleto.png", 
                infoGeneral: "El esqueleto humano adulto está compuesto por 206 huesos. Proporciona soporte, protege los órganos y permite el movimiento.",
                partes: [
                    { id: "craneo", nombre: "Cráneo", info: "Estructura ósea que protege el encéfalo.", x: 50, y: 10 },
                    { id: "costillas", nombre: "Caja Torácica (Costillas)", info: "Huesos que protegen el corazón y los pulmones.", x: 50, y: 28 },
                    { id: "pelvis", nombre: "Pelvis", info: "Conecta la columna vertebral con las extremidades inferiores.", x: 50, y: 48 },
                    { id: "femur", nombre: "Fémur", info: "El hueso más largo y fuerte del cuerpo, ubicado en el muslo.", x: 44, y: 68 }
                ]
            },
            "musculos": {
                imagen: "musculos.png",
                infoGeneral: "El sistema muscular permite el movimiento del cuerpo, mantiene la postura y hace circular la sangre.",
                partes: [
                    { id: "pectorales", nombre: "Pectorales", info: "Músculos del pecho que permiten mover los brazos hacia el cuerpo.", x: 50, y: 26 },
                    { id: "abdominales", nombre: "Abdominales", info: "Protegen los órganos internos y flexionan la columna.", x: 50, y: 38 },
                    { id: "biceps", nombre: "Bíceps", info: "Músculos del brazo encargados de flexionar el codo.", x: 26, y: 35 },
                    { id: "cuadriceps", nombre: "Cuádriceps", info: "Poderosos músculos en la parte frontal del muslo.", x: 43, y: 65 }
                ]
            },
            "nervioso": {
                imagen: "nervioso.png",
                infoGeneral: "El sistema nervioso transmite señales entre el cerebro y el resto del cuerpo, controlando la capacidad de moverse, respirar y pensar.",
                partes: [
                    { id: "cerebro", nombre: "Cerebro", info: "El centro de control principal del cuerpo.", x: 50, y: 8 },
                    { id: "medula", nombre: "Médula Espinal", info: "Vía principal de información que conecta el cerebro y los nervios periféricos.", x: 50, y: 35 },
                    { id: "nervio_ciatico", nombre: "Nervio Ciático", info: "El nervio más largo del cuerpo, baja por la pierna.", x: 45, y: 58 },
                    { id: "nervios_brazo", nombre: "Nervios Radiales/Cubitales", info: "Llevan señales a los brazos y manos.", x: 23, y: 45 }
                ]
            },
            "organos": {
                imagen: "organos.png",
                infoGeneral: "Los órganos internos trabajan en conjunto para digerir alimentos, bombear sangre, oxigenar el cuerpo y filtrar toxinas.",
                partes: [
                    { id: "pulmones", nombre: "Pulmones / Corazón", info: "Ubicados en el pecho; se encargan de la respiración y la circulación.", x: 50, y: 28 },
                    { id: "higado", nombre: "Hígado", info: "Desintoxica químicos y secreta bilis para la digestión.", x: 42, y: 37 },
                    { id: "estomago", nombre: "Estómago", info: "Órgano principal de la digestión de los alimentos.", x: 55, y: 39 },
                    { id: "intestinos", nombre: "Intestinos", info: "Absorben los nutrientes y el agua de los alimentos.", x: 50, y: 48 }
                ]
            }
        };

        function actualizarSistema() {
            const sistemaId = document.getElementById("select-sistema").value;
            const contenedorImg = document.getElementById("contenedor-img-zona");
            const imgZona = document.getElementById("img-zona");
            const marcador = document.getElementById("marcador");
            const contenedorSubpartes = document.getElementById("contenedor-subpartes");
            const selectSubparte = document.getElementById("select-subparte");
            const panelInfo = document.getElementById("panel-info");

            selectSubparte.innerHTML = '<option value="">-- Selecciona una parte --</option>';
            marcador.style.display = "none";

            if (sistemaId === "") {
                contenedorImg.style.display = "none";
                contenedorSubpartes.style.display = "none";
                panelInfo.style.display = "none";
                return;
            }

            const datos = datosSistemas[sistemaId];
            
            imgZona.src = datos.imagen;
            contenedorImg.style.display = "block";

            panelInfo.innerHTML = `<strong>${datos.infoGeneral}</strong>`;
            panelInfo.style.display = "block";

            datos.partes.forEach(parte => {
                const opcion = document.createElement("option");
                opcion.value = parte.id;
                opcion.textContent = parte.nombre;
                selectSubparte.appendChild(opcion);
            });

            contenedorSubpartes.style.display = "flex";
        }

        function actualizarInfoSubparte() {
            const sistemaId = document.getElementById("select-sistema").value;
            const subparteId = document.getElementById("select-subparte").value;
            const panelInfo = document.getElementById("panel-info");
            const marcador = document.getElementById("marcador");

            const datos = datosSistemas[sistemaId];

            if (subparteId === "") {
                panelInfo.innerHTML = `<strong>${datos.infoGeneral}</strong>`;
                marcador.style.display = "none";
            } else {
                const parte = datos.partes.find(p => p.id === subparteId);
                panelInfo.innerHTML = `<strong>${parte.nombre}:</strong> <br> ${parte.info}`;
                
                marcador.style.left = parte.x + "%";
                marcador.style.top = parte.y + "%";
                marcador.style.display = "block";
            }
        }

        /* =========================================
           BORRADOR MÁGICO (CORREGIDO A .PNG)
           ========================================= */

        const configuracionCapas = [
            { id: 'canvas-musculos', src: 'musculos.png' },
            { id: 'canvas-organos', src: 'organos.png' },
            { id: 'canvas-nervioso', src: 'nervioso.png' }
        ];

        let estaBorrando = false;
        let ultimoX = 0;
        let ultimoY = 0;
        let pincelSize = 30;
        let canvasActivo = null;
        let ctxActivo = null;

        function cargarImagenEnCanvas(idCanvas, rutaImagen) {
            const canvas = document.getElementById(idCanvas);
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;

            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const escala = Math.min(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * escala;
                const y = (canvas.height / 2) - (img.height / 2) * escala;
                
                ctx.drawImage(img, x, y, img.width * escala, img.height * escala);
                
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            };

            // Manejo de errores por si no encuentra la imagen
            img.onerror = () => {
                console.error(`No se pudo cargar la imagen: ${rutaImagen}. Verifica que esté en la misma carpeta que el archivo HTML y se llame exactamente así.`);
            };

            img.src = rutaImagen;
        }

        function inicializarLienzos() {
            configuracionCapas.forEach(capa => {
                cargarImagenEnCanvas(capa.id, capa.src);
            });
            setTimeout(cambiarCapaActiva, 150); 
        }

        function cambiarCapaActiva() {
            document.querySelectorAll('canvas.capa-anatomia').forEach(c => {
                c.classList.remove('capa-activa');
                c.onmousedown = null;
                c.onmousemove = null;
                c.onmouseup = null;
                c.onmouseout = null;
                c.ontouchstart = null;
                c.ontouchmove = null;
                c.ontouchend = null;
            });

            const radioSeleccionado = document.querySelector('input[name="capaSelect"]:checked');
            if(!radioSeleccionado) return;
            
            const idSeleccionado = radioSeleccionado.value;
            canvasActivo = document.getElementById(idSeleccionado);
            canvasActivo.classList.add('capa-activa');
            ctxActivo = canvasActivo.getContext('2d');

            configurarEventosBorrador(canvasActivo);
        }

        function actualizarSizeBorrador() {
            pincelSize = document.getElementById('size-borrador').value;
            document.getElementById('valor-size').innerText = pincelSize;
        }

        function obtenerCoordenadas(e, canvas) {
            const rect = canvas.getBoundingClientRect();
            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            const clienteY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
                x: clienteX - rect.left,
                y: clienteY - rect.top
            };
        }

        function configurarEventosBorrador(canvas) {
            const iniciarBorrado = (e) => {
                estaBorrando = true;
                const pos = obtenerCoordenadas(e, canvas);
                ultimoX = pos.x;
                ultimoY = pos.y;
                borrar(e);
            };

            const detenerBorrado = () => { estaBorrando = false; };

            const borrar = (e) => {
                if (!estaBorrando) return;
                e.preventDefault(); 

                const pos = obtenerCoordenadas(e, canvas);
                
                ctxActivo.lineWidth = pincelSize;
                ctxActivo.beginPath();
                ctxActivo.moveTo(ultimoX, ultimoY);
                ctxActivo.lineTo(pos.x, pos.y);
                ctxActivo.stroke(); 

                ultimoX = pos.x;
                ultimoY = pos.y;
            };

            canvas.addEventListener('mousedown', iniciarBorrado);
            canvas.addEventListener('mousemove', borrar);
            canvas.addEventListener('mouseup', detenerBorrado);
            canvas.addEventListener('mouseout', detenerBorrado);

            canvas.addEventListener('touchstart', iniciarBorrado, {passive: false});
            canvas.addEventListener('touchmove', borrar, {passive: false});
            canvas.addEventListener('touchend', detenerBorrado);
        }

        window.onload = () => { inicializarLienzos(); };
        window.onresize = () => { inicializarLienzos(); };

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fondo lluvia 🩺</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e69dfb;
    min-height:100vh;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

/* Contenido normal por encima */
.content{
    position:relative;
    z-index:2;
    padding:40px;
}

/* Fondo lluvia */
.rain{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
}

.drop{
    position:absolute;
    top:-80px;
    opacity:.12; /* casi transparente para no estorbar */
    filter:blur(.3px);
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:
            translateY(-120px)
            rotate(0deg);
    }

    to{
        transform:
            translateY(110vh)
            rotate(180deg);
    }
}
</style>
</head>

<body>

<!-- Fondo -->
<div class="rain"></div>


<script>
const rain = document.querySelector(".rain");
const total = 60;

for(let i=0;i<total;i++){

    const emoji = document.createElement("div");

    emoji.className = "drop";
    emoji.textContent = "🩺";

    emoji.style.left = Math.random()*100 + "vw";

    const size = 18 + Math.random()*16;
    emoji.style.fontSize = size + "px";

    emoji.style.animationDuration =
        (8 + Math.random()*8) + "s";

    emoji.style.animationDelay =
        Math.random()*10 + "s";

    rain.appendChild(emoji);
}
</script>

</body>
</html>
